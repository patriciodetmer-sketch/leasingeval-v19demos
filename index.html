const PILARES=[
  {id:'p1',name:'Capacidad de pago',peso:30,criterios:[
    {id:'dscr',name:'DSCR (cobertura de dividendo)',max:10,auto:true,desc:'≥1.50x=10 · 1.25-1.49=7 · 1.00-1.24=4 · <1.00=0'},
    {id:'df_ebitda',name:'Deuda financiera / EBITDA',max:8,auto:true,desc:'≤2.0x=8 · 2.01-3.0x=6 · 3.01-4.0x=3 · >4.0x=0'},
    {id:'fcl',name:'Flujo de caja libre proyectado',max:7,auto:true,desc:'FCL ≥1.5x cuota anual=7 · 1.0-1.49x=5 · 0.75-0.99x=2 · <0.75x=0'},

  ]},

    {id:'liq',name:'Liquidez corriente y ácida',max:6,auto:true,desc:'Corriente≥1.5x y ácida≥1.0x=6 · ambas 1.1-1.49=4 · menores=1'},

    {id:'ciclo',name:'Sensibilidad al ciclo económico',max:3,options:[[3,'No cíclico'],[2,'Moderadamente cíclico'],[0,'Altamente cíclico']]},
  ]},
];

function calcCuota(valor,pie,plazo,tasa){
  const monto=valor*(1-pie/100);
  const r=tasa/100/12;
  const c=r>0?monto*r/(1-Math.pow(1+r,-plazo)):monto/plazo;
  return{monto,cuotaMensual:c,cuotaAnual:c*12};
}

function autoScores(fin,op){
  const{ebitda,gfin,dfcp,dflp,ac,inv,pc,ptotal,patr}=fin;
  const dfTotal=dfcp+dflp;
  const{cuotaAnual}=calcCuota(op.valor,op.pie,op.plazo,op.tasa);
  const sd=gfin+dfcp+cuotaAnual;
  const dscr=sd>0?ebitda/sd:0;
  const dfE=ebitda>0?dfTotal/ebitda:99;
  const fcl=ebitda-gfin;
  const fclR=cuotaAnual>0?fcl/cuotaAnual:0;
  const cdt=ac-pc;
  const de=patr>0?ptotal/patr:99;
  const liqC=pc>0?ac/pc:0;
  const liqA=pc>0?(ac-inv)/pc:0;
  return{
    dscr:dscr>=1.5?10:dscr>=1.25?7:dscr>=1.0?4:0,
    df_ebitda:dfE<=2?8:dfE<=3?6:dfE<=4?3:0,
    fcl:fclR>=1.5?7:fclR>=1.0?5:fclR>=0.75?2:0,
    cdt:cdt>0?8:cdt===0?5:0,
    de:de<=1?7:de<=1.5?5:de<=2?3:0,
    liq:(liqC>=1.5&&liqA>=1.0)?6:(liqC>=1.1&&liqA>=1.0)?4:1,
    _dscr:dscr,_dfE:dfE,_liqC:liqC,_liqA:liqA,_de:de,_cdt:cdt,
  };
}

function calcScore(scores){
  const pilares=PILARES.map(p=>{
    const raw=p.criterios.reduce((s,c)=>s+(scores[c.id]||0),0);
    const maxRaw=p.criterios.reduce((s,c)=>s+c.max,0);
    const contrib=(raw/maxRaw)*p.peso;
    return{id:p.id,name:p.name,peso:p.peso,raw,maxRaw,contrib};
  });
  return{pilares,total:Math.round(pilares.reduce((s,p)=>s+p.contrib,0))};
}

function classify(t){
  if(t>=85)return{grade:'A+',risk:'Riesgo muy bajo',decision:'Aprobación directa',color:'#1E8449',bg:'#D5F5E3'};
  if(t>=75)return{grade:'A',risk:'Riesgo bajo',decision:'Aprobación — puede requerir seguro',color:'#1E8449',bg:'#D5F5E3'};
  if(t>=65)return{grade:'B+',risk:'Riesgo moderado',decision:'Aprobación condicionada (pie mayor o aval)',color:'#D68910',bg:'#FEF9E7'};
  if(t>=55)return{grade:'B',risk:'Riesgo medio',decision:'Comité de crédito obligatorio',color:'#D68910',bg:'#FEF9E7'};
  if(t>=40)return{grade:'C',risk:'Riesgo alto',decision:'Rechazo / excepción gerencial',color:'#922B21',bg:'#FADBD8'};
  return{grade:'D',risk:'No viable',decision:'RECHAZO — operación no viable',color:'#922B21',bg:'#FADBD8'};
}

function getAlerts(scores,op){
  const a=[];
  if(scores.dicom===0)a.push({type:'veto',msg:'Protestos vigentes en DICOM — rechazo automático'});
  if(scores.dscr<4)a.push({type:'warn',msg:'DSCR insuficiente — revisar capacidad de pago'});
  if(scores.cdt===0)a.push({type:'veto',msg:'Capital de trabajo críticamente negativo'});
  if(op.pie<20)a.push({type:'warn',msg:`Pie del ${op.pie}% — se recomienda mínimo 20%`});
  return a;
}

function exportPDF(exp){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const{empresa,op,fin,scores,total,grade,id,fecha,analista}=exp;

  const{cuotaMensual}=calcCuota(op.valor,op.pie,op.plazo,op.tasa);

  const NAVY=[26,58,92],BLUE=[46,109,164],LGRAY=[242,243,244],WHITE=[255,255,255];

  doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.text(`${id}  ·  ${fecha}  ·  Analista: ${analista}`,15,17);
  let y=32;
  doc.setFillColor(...LGRAY);doc.roundedRect(10,y,W-20,28,2,2,'F');
  doc.setTextColor(...NAVY);doc.setFontSize(12);doc.setFont('helvetica','bold');
  doc.text(empresa.razon,15,y+8);
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(74,74,74);
  doc.text(`RUT: ${empresa.rut}`,15,y+15);doc.text(`Sector: ${empresa.sector}`,15,y+21);
  doc.text(`Región: ${empresa.region}`,80,y+15);
  doc.setFillColor(...gc);doc.roundedRect(W-55,y+4,45,20,3,3,'F');
  doc.setTextColor(...WHITE);doc.setFontSize(22);doc.setFont('helvetica','bold');
  doc.text(String(total),W-45,y+17);doc.setFontSize(9);doc.text(grade,W-28,y+17);
  y+=34;
  doc.setFillColor(...NAVY);doc.rect(10,y,W-20,7,'F');
  doc.setTextColor(...WHITE);doc.setFontSize(8);doc.setFont('helvetica','bold');
  doc.text('  OPERACIÓN',10,y+5);y+=9;
  doc.autoTable({startY:y,margin:{left:10,right:10},
    head:[['Activo','Valor (UF)','Pie','Plazo','Tasa','Cuota mens.','Tipo']],
    body:[[op.activo,op.valor.toLocaleString('es-CL'),`${op.pie}%`,`${op.plazo}m`,`${op.tasa}%`,Math.round(cuotaMensual).toLocaleString('es-CL'),op.tipo]],
    headStyles:{fillColor:BLUE,textColor:WHITE,fontSize:7,fontStyle:'bold'},
    bodyStyles:{fontSize:7,textColor:[74,74,74]},alternateRowStyles:{fillColor:LGRAY},
    tableLineColor:[189,195,199],tableLineWidth:0.1});
  y=doc.lastAutoTable.finalY+6;
  const dfTotal=fin.dfcp+fin.dflp;
  const{cuotaAnual}=calcCuota(op.valor,op.pie,op.plazo,op.tasa);
  const dscrV=(fin.gfin+fin.dfcp+cuotaAnual)>0?fin.ebitda/(fin.gfin+fin.dfcp+cuotaAnual):0;
  const liqC=fin.pc>0?fin.ac/fin.pc:0;const liqA=fin.pc>0?(fin.ac-fin.inv)/fin.pc:0;
  const de=fin.patr>0?fin.ptotal/fin.patr:0;const dfE=fin.ebitda>0?dfTotal/fin.ebitda:0;
  doc.setFillColor(...NAVY);doc.rect(10,y,W-20,7,'F');
  doc.setTextColor(...WHITE);doc.text('  INDICADORES FINANCIEROS',10,y+5);y+=9;
  doc.autoTable({startY:y,margin:{left:10,right:10},
    head:[['Indicador','Valor','Umbral','Estado']],
    body:[['DSCR',fmt2(dscrV),'≥1.25x',dscrV>=1.25?'✓ OK':'⚠ Alerta'],
          ['DF/EBITDA',fmt2(dfE),'≤4.0x',dfE<=4?'✓ OK':'⚠ Alerta'],
          ['Liq. corriente',fmt2(liqC),'≥1.10x',liqC>=1.1?'✓ OK':'⚠ Alerta'],
          ['Liq. ácida',fmt2(liqA),'≥1.00x',liqA>=1.0?'✓ OK':'⚠ Alerta'],
          ['D/E',fmt2(de),'≤2.0x',de<=2?'✓ OK':'⚠ Alerta'],
          ['Capital trabajo',uf(fin.ac-fin.pc),'>0',(fin.ac-fin.pc)>0?'✓ OK':'⚠ Alerta']],
    headStyles:{fillColor:BLUE,textColor:WHITE,fontSize:7,fontStyle:'bold'},

  doc.setTextColor(...WHITE);doc.text('  SCORING POR PILAR',10,y+5);y+=9;
  const pilarRows=PILARES.map(p=>{
    const raw=p.criterios.reduce((s,c)=>s+(scores[c.id]||0),0);
    const maxR=p.criterios.reduce((s,c)=>s+c.max,0);
    const contrib=((raw/maxR)*p.peso).toFixed(1);
    return[p.name,`${raw}/${maxR}`,`${p.peso}%`,`${contrib}/${p.peso}`,`${Math.round(raw/maxR*100)}%`];
  });
  doc.autoTable({startY:y,margin:{left:10,right:10},
    head:[['Pilar','Pts raw','Ponderación','Contribución','% logrado']],
    body:[...pilarRows,
      [{content:'PUNTAJE TOTAL',styles:{fontStyle:'bold',fillColor:NAVY,textColor:WHITE}},'','',

       {content:`${grade} — ${cl.risk}`,styles:{fontStyle:'bold',fillColor:NAVY,textColor:WHITE}}]],

    tableLineColor:[189,195,199],tableLineWidth:0.1});

  doc.setTextColor(...WHITE);doc.setFontSize(10);doc.setFont('helvetica','bold');
  doc.text('DECISIÓN RECOMENDADA:',15,y+7);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text(cl.decision,15,y+13);

  doc.text('Leasit — Evaluación de Crédito Leasing · Uso confidencial interno',15,291);
  doc.text(`Generado: ${new Date().toLocaleString('es-CL')}`,W-55,291);
  doc.save(`${id}_${empresa.razon.replace(/\s+/g,'_').slice(0,30)}.pdf`);
}

// ── APP ────────────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[apiKey,setApiKey]=useState(()=>localStorage.getItem('le_apikey')||'');
  const[page,setPage]=useState('dashboard');
  const[detailId,setDetailId]=useState(null);
  const[expedientes,setExpedientes]=useState(DEMO_EXP);

  const saveApiKey=(k)=>{setApiKey(k);localStorage.setItem('le_apikey',k);};

  const addExp=(exp)=>{
    const id=`EXP-2026-${String(expedientes.length+43).padStart(4,'0')}`;
    const nuevo={...exp,id,fecha:new Date().toISOString().slice(0,10)};
    setExpedientes(prev=>[nuevo,...prev]);
    return id;
  };
  const updateExp=(id,patch)=>setExpedientes(prev=>prev.map(e=>e.id===id?{...e,...patch}:e));

  if(!user)return h(Login,{onLogin:setUser,apiKey,onSaveApiKey:saveApiKey});
  if(page==='detail')return h(Layout,{user,page,setPage,onLogout:()=>setUser(null)},
    h(DetalleExpediente,{exp:expedientes.find(e=>e.id===detailId),
      onBack:()=>setPage('expedientes'),onUpdate:updateExp,onExportPDF:exportPDF}));
  if(page==='nueva')return h(Layout,{user,page,setPage,onLogout:()=>setUser(null)},
    h(NuevaEval,{user,apiKey,onSave:(exp)=>{const id=addExp(exp);setDetailId(id);setPage('detail');}}));
  if(page==='expedientes')return h(Layout,{user,page,setPage,onLogout:()=>setUser(null)},
    h(Expedientes,{expedientes,onSelect:(id)=>{setDetailId(id);setPage('detail');}}));
  return h(Layout,{user,page,setPage,onLogout:()=>setUser(null)},
    h(Dashboard,{expedientes,onSelect:(id)=>{setDetailId(id);setPage('detail');},onNueva:()=>setPage('nueva')}));
}

function NuevaEval({user,apiKey,onSave}){

  const[fin,setFin]=useState(emptyFin);
  const[scores,setScores]=useState({});
  const[auto,setAuto]=useState({});
  const[errs,setErrs]=useState({});
  const[result,setResult]=useState(null);
  const[estado,setEstado]=useState('en_revision');

  const{cuotaMensual,monto}=calcCuota(op.valor,op.pie,op.plazo,op.tasa);

  useEffect(()=>{
    const a=autoScores(fin,op);setAuto(a);
    setScores(prev=>({...prev,dscr:a.dscr,df_ebitda:a.df_ebitda,fcl:a.fcl,cdt:a.cdt,de:a.de,liq:a.liq}));
  },[fin,op.valor,op.pie,op.plazo,op.tasa]);

  const setF=(k,v)=>setFin(prev=>({...prev,[k]:parseFloat(v)*1000||0}));
  const setO=(k,v)=>setOp(prev=>({...prev,[k]:['activo','tipo'].includes(k)?v:parseFloat(v)||0}));

  const v0=()=>{const e={};if(!empresa.razon)e.razon=1;if(!empresa.rut)e.rut=1;if(!op.activo)e.activo=1;if(!op.valor)e.valor=1;setErrs(e);return!Object.keys(e).length;};
  const v1=()=>{const e={};['ventas','ebitda','gfin','ac','pc','dfcp','dflp','ptotal','patr'].forEach(k=>{if(!fin[k])e[k]=1;});setErrs(e);return!Object.keys(e).length;};

  const handleXLSX=ev=>{
    const file=ev.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array',cellText:false});

        // Helper: primer valor no-nulo desde un índice hasta otro
        const firstVal=(row,from,to)=>{for(let i=from;i<=to&&i<row.length;i++){if(row[i]!=null&&row[i]!=='')return row[i];}return null;};

        // ── 1. HOJA SCORING → identificación + operación ──────────────────
        const scoringSheet=wb.Sheets['Scoring']||wb.Sheets['scoring']||wb.Sheets['SCORING'];
        const empMap={};const opMap={};
        if(scoringSheet){
          const sd=XLSX.utils.sheet_to_json(scoringSheet,{header:1,raw:true,defval:null});
          sd.forEach(row=>{
            if(!row)return;
            const lbl=String(row[1]||row[0]||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
            if(!lbl)return;
            // valL = valor columna C (idx 2), sin tocar col D que es label derecho (idx 3-4)
            const valL=firstVal(row,2,3);
            // valR = valor columna F (idx 5), que es donde están RUT, plazo, tasa
            const valR=row[5]!=null&&row[5]!==''?row[5]:null;

            // Empresa
            if(lbl.includes('razon social')&&valL)                        { empMap.razon=String(valL); if(valR&&typeof valR==='string'&&valR.includes('.'))empMap.rut=String(valR); }
            if((lbl.includes('sector')||lbl.includes('industria'))&&valL)  empMap.sector=String(valL);
            if(lbl.includes('region')&&lbl.includes('ciudad')&&valL)       empMap.region=String(valL);
            // Operación
            if(lbl.includes('descripcion')&&lbl.includes('activo')&&valL){ opMap.activo=String(valL); if(valR&&typeof valR==='string'&&valR.toLowerCase().includes('leas'))opMap.tipo=String(valR); }
            if(lbl.includes('valor del activo')&&valL)        { opMap.valor=parseFloat(valL)||0; if(valR&&!isNaN(parseFloat(valR)))opMap.plazo=parseInt(valR)||48; }
            if(lbl.includes('pie')&&lbl.includes('inicial')&&valL){ opMap.pie=parseFloat(valL)||10; if(valR&&!isNaN(parseFloat(valR)))opMap.tasa=parseFloat(valR)||6.5; }
          });
        }

        // ── 2. HOJA INDICADORES → datos financieros ───────────────────────
        const finMap={};
        const sheetName=wb.SheetNames.find(n=>n.toLowerCase().includes('indicador'))||wb.SheetNames[0];
        const ws=wb.Sheets[sheetName];
        const data=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
        const byRow={8:'ventas',12:'ebitda',13:'dep',15:'gfin',18:'util',20:'ac',21:'inv',24:'pc',25:'dfcp',26:'dflp',28:'ptotal',29:'patr'};
        Object.entries(byRow).forEach(([idx,key])=>{
          const row=data[+idx];if(!row)return;
          const v=parseFloat(row[4])||parseFloat(row[3])||parseFloat(row[2])||0;
          if(v&&!isNaN(v))finMap[key]=v;
        });
        if(Object.keys(finMap).length<6){
          data.forEach(row=>{
            if(!row)return;
            const l=String(row[1]||row[0]||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
            const v=parseFloat(row[4])||parseFloat(row[3])||parseFloat(row[2])||parseFloat(row[1])||0;
            if(!v||isNaN(v))return;
            if(l.includes('ingresos por ventas'))finMap.ventas=finMap.ventas||v;
            if(l.includes('ebitda'))finMap.ebitda=finMap.ebitda||v;
            if(l.includes('resultado neto del ejercicio'))finMap.util=finMap.util||v;
            if(l==='gastos financieros')finMap.gfin=finMap.gfin||v;
            if(l.includes('depreciacion'))finMap.dep=finMap.dep||v;
            if(l==='activo corriente total')finMap.ac=finMap.ac||v;
            if(l.includes('existencias / inventarios'))finMap.inv=finMap.inv||v;
            if(l==='pasivo corriente total')finMap.pc=finMap.pc||v;
            if(l==='deuda financiera corto plazo')finMap.dfcp=finMap.dfcp||v;
            if(l==='deuda financiera largo plazo')finMap.dflp=finMap.dflp||v;
            if(l==='pasivo total')finMap.ptotal=finMap.ptotal||v;
            if(l==='patrimonio neto')finMap.patr=finMap.patr||v;
          });
        }

        // ── 3. Aplicar ────────────────────────────────────────────────────
        const eKeys=Object.keys(empMap);const oKeys=Object.keys(opMap);const fKeys=Object.keys(finMap);
        const total=eKeys.length+oKeys.length+fKeys.length;
        if(total===0){alert('No se encontraron datos.\nVerifica que el archivo sea la planilla LeasingEval.');return;}

        // Actualizar estado directamente (sin functional updater para evitar problemas async)
        if(eKeys.length>0) setEmpresa({razon:empMap.razon||'',rut:empMap.rut||'',sector:empMap.sector||'',region:empMap.region||''});
        if(oKeys.length>0) setOp({
          activo:opMap.activo||'',
          tipo:opMap.tipo||'Leasing financiero',
          valor:opMap.valor||0,
          pie:opMap.pie||10,
          plazo:opMap.plazo||48,
          tasa:opMap.tasa||6.5
        });
        if(fKeys.length>0) setFin({
          ventas:finMap.ventas||0,ebitda:finMap.ebitda||0,util:finMap.util||0,
          gfin:finMap.gfin||0,dep:finMap.dep||0,ac:finMap.ac||0,
          inv:finMap.inv||0,pc:finMap.pc||0,dfcp:finMap.dfcp||0,
          dflp:finMap.dflp||0,ptotal:finMap.ptotal||0,patr:finMap.patr||0
        });

        alert('✓ Datos cargados:\n'
          +'• Empresa ('+eKeys.length+'/4): '+(eKeys.length>0?eKeys.join(', '):'ninguno')+'\n'
          +'• Operación ('+oKeys.length+'/6): '+(oKeys.length>0?oKeys.join(', '):'ninguno')+'\n'
          +'• Financiero ('+fKeys.length+'/12)');
      }catch(err){alert('Error: '+err.message);}
    };reader.readAsArrayBuffer(file);
  };

  const [pdfLoading, setPdfLoading] = useState(false);
  const [pdfStatus, setPdfStatus] = useState('');

  const handlePDF = ev => {
    const file = ev.target.files[0];
    if (!file) return;
    if (!apiKey) {
      setPdfStatus('⚠ Necesitas configurar tu API Key primero. Cierra sesión → pestaña "API Key IA".');
      return;
    }
    const reader = new FileReader();
    reader.onload = async e => {
      setPdfLoading(true);
      setPdfStatus('Leyendo el PDF...');
      try {
        const base64 = btoa(String.fromCharCode(...new Uint8Array(e.target.result)));
        setPdfStatus('Enviando a IA para extraer los datos...');
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1500,
            messages: [{
              role: 'user',
              content: [
                { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64 } },
                { type: 'text', text: `Eres un analista financiero especialista en leasing en Chile. Lee este documento (puede ser un estado financiero, informe de evaluación o carpeta de crédito) y extrae TODA la información disponible. Responde ÚNICAMENTE con un JSON válido, sin texto adicional, sin markdown, sin explicaciones. Usa 0 o "" si no encuentras el dato:
{
  "empresa": "",
  "rut": "",
  "sector": "",
  "region": "",
  "activo": "",
  "tipo_leasing": "",
  "valor_activo_uf": 0,
  "pie_pct": 0,
  "plazo_meses": 0,
  "tasa_anual_pct": 0,
  "ventas": 0,
  "ebitda": 0,
  "util": 0,
  "gfin": 0,
  "dep": 0,
  "ac": 0,
  "inv": 0,
  "pc": 0,
  "dfcp": 0,
  "dflp": 0,
  "ptotal": 0,
  "patr": 0
}
Definiciones: empresa=razón social, rut=RUT empresa (formato XX.XXX.XXX-X), sector=industria/rubro, region=región de Chile donde opera, activo=descripción del bien a financiar, tipo_leasing=tipo de contrato, valor_activo_uf=valor del activo en UF, pie_pct=porcentaje de pie inicial, plazo_meses=plazo del contrato en meses, tasa_anual_pct=tasa de interés anual en %, ventas=ingresos/ventas netas en UF, ebitda=EBITDA en UF, util=utilidad/resultado neto en UF, gfin=gastos financieros en UF, dep=depreciación y amortización en UF, ac=activo corriente total en UF, inv=existencias/inventarios en UF, pc=pasivo corriente total en UF, dfcp=deuda financiera corto plazo en UF, dflp=deuda financiera largo plazo en UF, ptotal=pasivo total en UF, patr=patrimonio neto en UF.` }

        const data = await response.json();

        // Aplicar datos de identificación
        if (parsed.empresa || parsed.rut || parsed.sector || parsed.region) {
          setEmpresa({

        h('div',null,h('div',{style:{fontSize:12,fontWeight:500,marginBottom:8}},'Balance'),[['Activo corriente',fin.ac],['Pasivo corriente',fin.pc],['Deuda financiera total',dfTotal],['Pasivo total',fin.ptotal],['Patrimonio neto',fin.patr]].map(([l,v])=>h('div',{key:l,style:{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid var(--gray-bd)',fontSize:13}},h('span',{style:{color:'var(--gray-md)'}},l),h('span',{style:{fontFamily:'var(--font-mono)',fontWeight:500}},uf(v))))))));
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
